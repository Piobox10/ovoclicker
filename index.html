
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ovo Clicker: React Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: linear-gradient(to bottom right, #0f172a, #1e293b, #0f172a); /* slate-900 to slate-800 to slate-900 */
        }
        /* Custom Scrollbar Styles */
        ::-webkit-scrollbar {
          width: 10px; 
          height: 10px;
        }
        ::-webkit-scrollbar-track {
          background: #1e293b; /* slate-800 */
          border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb {
          background: #4338ca; /* indigo-700 */
          border-radius: 5px;
          border: 2px solid #1e293b; /* slate-800 to give a nice border */
        }
        ::-webkit-scrollbar-thumb:hover {
          background: #4f46e5; /* indigo-600 */
        }
        /* For Firefox */
        html {
          scrollbar-width: thin;
          scrollbar-color: #4338ca #1e293b; /* thumb and track */
        }

        /* Minor focus visible utility for non-button elements if needed */
        .focusable:focus-visible {
            outline: 2px solid #818cf8; /* indigo-400 */
            outline-offset: 2px;
            border-radius: 4px;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "decimal.js": "https://esm.sh/decimal.js@^10.5.0",

    "react-dom/": "https://esm.sh/react-dom@^19.1.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-900 flex justify-center items-start min-h-screen p-2 sm:p-5 box-border overflow-y-auto">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
